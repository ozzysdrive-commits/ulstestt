<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix | Global Ops Center</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --dark-black: #050505;
            --surface-color: #121212;
            --border-color: #2a2a2a;
            --text-main: #e0e0e0;
            --text-dim: #888;
        }

        body {
            background-color: var(--dark-black);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            font-weight: 200;
            letter-spacing: 8px;
            text-transform: uppercase;
            color: var(--neon-blue);
            margin: 0;
            font-size: 24px;
        }

        .search-wrapper {
            position: relative;
            margin-bottom: 40px;
        }

        input {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            padding: 15px 30px;
            width: 400px;
            border-radius: 4px;
            color: var(--neon-blue);
            font-size: 18px;
            text-align: center;
            letter-spacing: 3px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.15);
        }

        table {
            width: 100%;
            max-width: 1400px;
            border-collapse: collapse;
            background: var(--surface-color);
            border-radius: 8px;
            overflow: hidden;
        }

        th {
            background: #1a1a1a;
            color: var(--text-dim);
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 2px;
            padding: 20px;
            text-align: left;
            border-bottom: 2px solid var(--dark-black);
        }

        td {
            padding: 18px 20px;
            border-bottom: 1px solid var(--border-color);
            font-size: 13px;
            line-height: 1.5;
        }

        tr:last-child td { border-bottom: none; }

        .dest-row {
            background: rgba(0, 242, 255, 0.03);
        }

        .dest-row td:nth-child(2) {
            color: var(--neon-blue);
            font-weight: bold;
        }

        .prio-tag {
            background: #222;
            color: #fff;
            padding: 4px 10px;
            border-radius: 3px;
            font-size: 11px;
            border: 1px solid #444;
        }

        .no-data {
            padding: 40px;
            text-align: center;
            color: var(--text-dim);
            letter-spacing: 1px;
        }

        /* Responsive UI */
        @media (max-width: 768px) {
            body { padding: 10px; }
            input { width: 90%; }
            table { font-size: 11px; }
        }
    </style>
</head>

    function filterTable() {
        const input = document.getElementById("icaoSearch").value.toUpperCase();
        const tbody = document.getElementById("tableContent");
        tbody.innerHTML = "";

        if (input.length < 2) return;

        const filtered = rawData.filter(row => row[0] === input);

        if (filtered.length > 0) {
            filtered.forEach(data => {
                const tr = document.createElement("tr");
                if (data[2] === "DEST") tr.className = "dest-row";
                
                data.forEach((cell, index) => {
                    const td = document.createElement("td");
                    if (index === 3 && cell !== "-") {
                        td.innerHTML = `<span class="prio-tag">${cell}</span>`;
                    } else {
                        td.textContent = cell;
                    }
                    tr.appendChild(td);
                });
                tbody.appendChild(tr);
            });
        } else {
            tbody.innerHTML = `<tr><td colspan="8" class="no-data">ICAO NOT FOUND IN MATRIX</td></tr>`;
